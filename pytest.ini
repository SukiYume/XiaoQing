[pytest]
# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    unit: 单元测试（快速，无外部依赖）
    integration: 集成测试（多组件协作）
    plugin: 插件测试
    core: 核心模块测试
    slow: 慢速测试（>1秒）
    async: 异步测试
    external: 需要外部依赖（已mock可运行）

# 异步测试配置
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 输出配置
addopts =
    --verbose
    --strict-markers
    --tb=short

# 覆盖率配置
[coverage:run]
source = core,plugins
omit =
    */test_*.py
    */__init__.py
    */conftest.py
    plugins/xiaoqing_chat/brain/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    @abstractmethod
    if __name__ == .__main__.:
